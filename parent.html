<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Torder Tablet Sandbox Test</title>
    <style>
      :root {
        --bg-1: #f4f5f9;
        --bg-2: #e9ecf3;
        --ink: #1f232d;
        --muted: #626978;
        --frame: #11141a;
        --screen: #04060b;
        --panel: #ffffff;
        --line: #d9dfea;
        --accent: #ff2348;
        --accent-dark: #d91038;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        font-family: "Pretendard", "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 12% 8%, #ffffff, transparent 30%),
          radial-gradient(circle at 86% 16%, #f9faff, transparent 35%),
          linear-gradient(150deg, var(--bg-1), var(--bg-2));
      }

      .layout {
        min-height: 100%;
        display: grid;
        gap: 18px;
        grid-template-columns: 1fr;
        align-items: start;
        justify-items: center;
        padding: 20px;
      }

      .tablet {
        width: min(92vw, 980px);
        aspect-ratio: 16 / 10;
        background: var(--frame);
        border-radius: 32px;
        padding: 14px;
        box-shadow: 0 24px 52px rgba(20, 24, 33, 0.35);
        position: relative;
      }

      .camera-dot {
        position: absolute;
        top: 8px;
        left: 50%;
        transform: translateX(-50%);
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #404040;
      }

      .screen {
        width: 100%;
        height: 100%;
        border-radius: 18px;
        overflow: hidden;
        background: var(--screen);
      }

      iframe {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
      }

      .panel {
        width: min(92vw, 860px);
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 14px;
        box-shadow: 0 10px 24px rgba(19, 23, 31, 0.08);
      }

      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }

      button {
        border: 1px solid #c9d0dc;
        border-radius: 10px;
        background: linear-gradient(180deg, #ffffff, #f3f5f9);
        color: #313745;
        padding: 8px 12px;
        font-size: 14px;
        cursor: pointer;
        font-weight: 700;
      }

      button.primary {
        background: linear-gradient(180deg, var(--accent), var(--accent-dark));
        border-color: #c70d33;
        color: #fff;
      }

      button:active {
        transform: translateY(1px);
      }

      .hint {
        margin: 10px 0 0;
        color: var(--muted);
        font-size: 13px;
      }

      .log {
        margin-top: 10px;
        width: 100%;
        height: min(34vh, 280px);
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #f6f8fc;
        padding: 10px;
        overflow: auto;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
        font-size: 12px;
        line-height: 1.5;
        white-space: pre-wrap;
      }

      @media (min-width: 980px) {
        .layout {
          grid-template-columns: auto minmax(360px, 1fr);
          align-items: center;
          justify-content: center;
        }

        .panel {
          height: fit-content;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <section class="tablet" aria-label="Virtual Torder Tablet">
        <span class="camera-dot" aria-hidden="true"></span>
        <div class="screen">
          <iframe
            id="ad-iframe"
            title="INT Ad Sandbox"
            src="./index.html"
            sandbox="allow-scripts allow-forms"
            referrerpolicy="no-referrer"
          ></iframe>
        </div>
      </section>

      <section class="panel" aria-label="INT Message Console">
        <div class="row">
          <button id="btn-play" class="primary" type="button">Send INT_PLAY</button>
          <button id="btn-close" type="button">Send INT_CLOSE</button>
          <button id="btn-clear" type="button">Clear Logs</button>
        </div>
        <p id="status" class="hint">Status: waiting for iframe load</p>
        <p class="hint">
          부모(가상 단말)에서 iframe으로 메시지를 보내고, iframe이 되돌려주는
          <code>INT_IMPRESSION</code>/<code>INT_ENDED</code>/<code>INT_ERROR</code>/<code>INT_CLOSE</code>를 아래에서 확인할 수 있습니다.
        </p>
        <div id="log" class="log" aria-live="polite"></div>
      </section>
    </div>

    <script>
      (function () {
        "use strict";

        var iframe = document.getElementById("ad-iframe");
        var logBox = document.getElementById("log");
        var btnPlay = document.getElementById("btn-play");
        var btnClose = document.getElementById("btn-close");
        var btnClear = document.getElementById("btn-clear");
        var status = document.getElementById("status");

        function writeLog(prefix, payload) {
          var line = "[" + new Date().toLocaleTimeString() + "] " + prefix + " " + JSON.stringify(payload);
          console.log(prefix, payload);
          logBox.textContent += line + "\n";
          logBox.scrollTop = logBox.scrollHeight;
        }

        function sendToAd(type, body) {
          var message = { type: type, body: body || {} };
          if (!iframe.contentWindow) {
            writeLog("PARENT_ERROR", { code: "NO_IFRAME_WINDOW" });
            status.textContent = "Status: iframe window unavailable";
            return;
          }
          iframe.contentWindow.postMessage(message, "*");
          writeLog("PARENT_SEND", message);
          status.textContent = "Status: sent " + type;
        }

        window.addEventListener("message", function (event) {
          var msg = event.data || {};
          writeLog("PARENT_RECV", msg);
          status.textContent = "Status: received " + (msg.type || "unknown");
        });

        iframe.addEventListener("load", function () {
          writeLog("PARENT_INFO", { status: "IFRAME_LOADED", src: iframe.getAttribute("src") });
          status.textContent = "Status: iframe loaded";
        });

        btnPlay.addEventListener("click", function () {
          sendToAd("INT_PLAY", {});
        });

        btnClose.addEventListener("click", function () {
          sendToAd("INT_CLOSE", {});
        });

        btnClear.addEventListener("click", function () {
          logBox.textContent = "";
        });
      })();
    </script>
  </body>
</html>
